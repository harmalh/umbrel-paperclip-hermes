name: Build Paperclip Hermes Image (Manual)

on:
  push:
    branches: [main]
    paths:
      - "docker/**"
      - "app/umbrel-app.yml"
      - "README.md"
      - ".github/workflows/build-paperclip-hermes-image.yml"
  workflow_dispatch:
    inputs:
      paperclip_ref:
        description: "paperclipai/paperclip git ref (tag/branch/sha)"
        required: true
        default: "v2026.325.0"
      hermes_ref:
        description: "NousResearch/hermes-agent git ref (tag/branch/sha)"
        required: true
        default: "v2026.4.8"
      image_repository:
        description: "Container repository to publish to"
        required: true
        default: "ghcr.io/harmalh/paperclip-hermes-umbrel"
      image_tag:
        description: "Registry tag"
        required: true
        default: "2026.325.0-hermes.3"
      push_image:
        description: "Push built image to registry"
        type: boolean
        required: true
        default: false

jobs:
  build-and-smoke:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      EFFECTIVE_PAPERCLIP_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.paperclip_ref || 'v2026.325.0' }}
      EFFECTIVE_HERMES_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.hermes_ref || 'v2026.4.8' }}
      EFFECTIVE_IMAGE_REPOSITORY: ${{ github.event_name == 'workflow_dispatch' && inputs.image_repository || 'ghcr.io/harmalh/paperclip-hermes-umbrel' }}
      EFFECTIVE_IMAGE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.image_tag || '2026.325.0-hermes.3' }}
      EFFECTIVE_PUSH_IMAGE: ${{ github.event_name == 'push' || inputs.push_image }}

    steps:
      - name: Checkout packaging repo
        uses: actions/checkout@v6

      - name: Checkout upstream Paperclip
        uses: actions/checkout@v6
        with:
          repository: paperclipai/paperclip
          ref: ${{ env.EFFECTIVE_PAPERCLIP_REF }}
          path: upstream-paperclip

      - name: Checkout upstream Hermes Agent
        uses: actions/checkout@v6
        with:
          repository: NousResearch/hermes-agent
          ref: ${{ env.EFFECTIVE_HERMES_REF }}
          path: upstream-hermes

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: ${{ env.EFFECTIVE_PUSH_IMAGE == 'true' }}
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build multi-arch image (and optionally push)
        id: buildx
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./docker/paperclip-hermes.Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ env.EFFECTIVE_PUSH_IMAGE == 'true' }}
          tags: |
            ${{ env.EFFECTIVE_IMAGE_REPOSITORY }}:${{ env.EFFECTIVE_IMAGE_TAG }}

      - name: Print digest
        if: ${{ env.EFFECTIVE_PUSH_IMAGE == 'true' }}
        run: |
          echo "Digest: ${{ steps.buildx.outputs.digest }}"

      - name: Local smoke test (amd64 only)
        run: |
          set -euo pipefail

          docker buildx build \
            --platform linux/amd64 \
            --load \
            -f docker/paperclip-hermes.Dockerfile \
            -t local/paperclip-hermes-smoke:${{ github.run_id }} \
            .

          mkdir -p /tmp/paperclip-hermes-data
          chmod 0777 /tmp/paperclip-hermes-data

          cid="$(docker run -d \
            -e HOST=0.0.0.0 \
            -e PORT=3100 \
            -e SERVE_UI=true \
            -e PAPERCLIP_HOME=/paperclip \
            -e HERMES_HOME=/paperclip/hermes-home \
            -e PAPERCLIP_PUBLIC_URL=http://127.0.0.1:3100 \
            -e PAPERCLIP_ALLOWED_HOSTNAMES=127.0.0.1,localhost \
            -e PAPERCLIP_DEPLOYMENT_MODE=authenticated \
            -e PAPERCLIP_DEPLOYMENT_EXPOSURE=private \
            -e BETTER_AUTH_SECRET=paperclip-hermes-smoke-secret \
            -e PAPERCLIP_MIGRATION_AUTO_APPLY=true \
            -e PAPERCLIP_MIGRATION_PROMPT=never \
            -v /tmp/paperclip-hermes-data:/paperclip \
            -p 3100:3100 \
            local/paperclip-hermes-smoke:${{ github.run_id }})"

          ok="false"
          for i in $(seq 1 90); do
            if curl -fsS http://127.0.0.1:3100/api/health >/tmp/paperclip-hermes-health.json; then
              cat /tmp/paperclip-hermes-health.json
              ok="true"
              break
            fi
            sleep 2
          done

          docker exec -u node -w /app "${cid}" hermes --help >/tmp/paperclip-hermes-help.txt
          cat /tmp/paperclip-hermes-help.txt

          docker exec -u node -w /app "${cid}" \
            rg -n "hermes_local" server/dist packages

          docker logs "${cid}" --tail 250
          docker rm -f "${cid}" || true

          if [ "${ok}" != "true" ]; then
            echo "Smoke test failed: /api/health did not become ready" >&2
            exit 1
          fi
